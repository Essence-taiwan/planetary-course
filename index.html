<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行星意識・入門線上課</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE7D9;
    --cream-border: #DDD6C5;
    --text-primary: #2C2820;
    --text-secondary: #6B6257;
    --text-muted: #9C9189;
    --accent: #8B6F4E;
    --accent-light: #C4A882;
    --sidebar-w: 280px;
    --serif: 'Noto Serif TC', serif;
    --sans: 'Noto Sans TC', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--cream);
    color: var(--text-primary);
    font-family: var(--sans);
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--cream-dark);
    border-right: 1px solid var(--cream-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 2.5rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--cream-border);
    flex-shrink: 0;
  }

  .sidebar-course-label {
    display: none;
  }

  .sidebar-course-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.55;
    margin-bottom: 0.3rem;
  }

  .sidebar-course-subtitle {
    font-size: 11px;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  .sidebar-nav {
    overflow-y: auto;
    flex: 1;
    padding: 0.75rem 0 2rem;
  }

  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--cream-border); border-radius: 2px; }

  /* Chapter group */
  .chapter-group {
    margin-bottom: 0.25rem;
  }

  .chapter-label {
    padding: 0.75rem 1.25rem 0.35rem;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--serif);
    font-weight: 500;
  }

  .chapter-label .ch-symbol {
    font-size: 14px;
    opacity: 0.7;
  }

  .chapter-label .ch-name {
    font-size: 13px;
  }

  /* Lesson item */
  .lesson-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 0.55rem 1.25rem 0.55rem 1.4rem;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 2px solid transparent;
    position: relative;
  }

  .lesson-item:hover {
    background: rgba(139,111,78,0.07);
  }

  .lesson-item.active {
    background: rgba(139,111,78,0.1);
    border-left-color: var(--accent);
  }

  .lesson-item.active .lesson-num,
  .lesson-item.active .lesson-name {
    color: var(--accent);
  }

  .lesson-num {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 300;
    flex-shrink: 0;
    padding-top: 2px;
    min-width: 22px;
  }

  .lesson-name {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.55;
    font-weight: 300;
  }

  /* ── Main content ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--cream);
  }

  /* Banner */
  .course-banner {
    width: 100%;
    height: 160px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }

  .course-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* Fallback if image not loaded */
  .course-banner-fallback {
    width: 100%;
    height: 100%;
    background: #2D4A35;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .course-banner-fallback .banner-en {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
  }

  .course-banner-fallback .banner-zh {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.05em;
  }

  .course-banner-fallback .banner-sub {
    font-family: var(--serif);
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .main-header {
    padding: 0.9rem 2rem 0.75rem;
    border-bottom: 1px solid var(--cream-border);
    flex-shrink: 0;
  }

  .main-breadcrumb {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
    letter-spacing: 0.04em;
  }

  .main-lesson-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .main-body {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 2.5rem 3rem;
  }

  /* Video area */
  .video-wrapper {
    width: 100%;
    max-width: 800px;
    background: #1a1714;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16 / 9;
    position: relative;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 24px rgba(44,40,32,0.12);
  }

  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .video-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #6B6257;
    background: #2C2820;
  }

  .video-placeholder .play-icon {
    width: 52px;
    height: 52px;
    border: 1.5px solid #6B6257;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-placeholder .play-icon svg {
    margin-left: 3px;
  }

  .video-placeholder p {
    font-size: 13px;
    color: #6B6257;
    font-weight: 300;
  }

  /* Lesson info */
  .lesson-meta {
    max-width: 800px;
    padding-top: 0.5rem;
  }

  .lesson-chapter-tag {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent-light);
    margin-bottom: 0.5rem;
  }

  .lesson-full-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 400;
    color: var(--text-primary);
    margin-bottom: 0.75rem;
    line-height: 1.5;
  }

  /* Nav arrows */
  .lesson-nav {
    display: flex;
    gap: 10px;
    margin-top: 2rem;
    max-width: 800px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0.5rem 1rem;
    font-size: 12px;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid var(--cream-border);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.12s;
  }

  .nav-btn:hover {
    background: var(--cream-dark);
    color: var(--text-primary);
    border-color: var(--accent-light);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* Welcome state */
  .welcome-state {
    max-width: 560px;
    padding-top: 1rem;
  }

  .welcome-state .welcome-symbol {
    font-size: 32px;
    color: var(--accent-light);
    margin-bottom: 1rem;
    opacity: 0.6;
  }

  .welcome-state h2 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--text-primary);
    margin-bottom: 0.75rem;
  }

  .welcome-state p {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.8;
    font-weight: 300;
  }

  .start-btn {
    margin-top: 1.5rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0.6rem 1.25rem;
    font-size: 13px;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--accent-light);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 400;
    transition: all 0.12s;
  }

  .start-btn:hover {
    background: rgba(139,111,78,0.08);
  }

  /* Divider in sidebar */
  .sidebar-divider {
    height: 1px;
    background: var(--cream-border);
    margin: 0.5rem 1.25rem;
    opacity: 0.6;
  }

  /* Chapters 7 & 8 */
  .coming-soon-tag {
    font-size: 10px;
    color: var(--text-muted);
    background: rgba(156,145,137,0.15);
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 4px;
  }
</style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <p class="sidebar-course-label">入門線上課</p>
      <p class="sidebar-course-subtitle">課程列表</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Banner：將圖片上傳到 GitHub 後，把 src 改成圖片檔名，例如 src="banner.png" -->
    <div class="course-banner">
      <img src="banner.png" alt="行星意識入門線上課"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="course-banner-fallback" style="display:none;">
        <span class="banner-en">Planetary Consciousness Astrology · Beginner Course</span>
        <span class="banner-zh">行星意識・入門線上課</span>
        <span class="banner-sub">認識自己的天空地圖</span>
      </div>
    </div>

    <div class="main-header" id="mainHeader">
      <p class="main-breadcrumb" id="breadcrumb">選擇左側課程開始學習</p>
      <h1 class="main-lesson-title" id="mainTitle">行星意識・入門線上課</h1>
    </div>

    <div class="main-body" id="mainBody">
      <div class="welcome-state" id="welcomeState">
        <div class="welcome-symbol">☉ ☽ ♂ ☿ ♀</div>
        <h2>歡迎來到你的天空地圖</h2>
        <p>這套課程帶你從太陽系的宇宙視角出發，<br>逐步認識太陽、月亮、水星、金星、火星五顆內行星，<br>以及相位與宮位的完整結構。<br><br>從左側選擇第一堂課開始你的旅程。</p>
        <button class="start-btn" onclick="selectLesson(0)">從第一堂開始 →</button>
      </div>

      <div id="videoState" style="display:none;">
        <div class="video-wrapper" id="videoWrapper">
          <div class="video-placeholder" id="videoPlaceholder">
            <div class="play-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#6B6257"><polygon points="5,3 19,12 5,21"/></svg>
            </div>
            <p>請填入影片連結</p>
          </div>
          <iframe id="videoFrame" style="display:none;" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>

        <div class="lesson-meta">
          <p class="lesson-chapter-tag" id="lessonChapterTag"></p>
          <p class="lesson-full-title" id="lessonFullTitle"></p>
        </div>

        <div class="lesson-nav">
          <button class="nav-btn" id="prevBtn" onclick="navigateLesson(-1)">← 上一節</button>
          <button class="nav-btn" id="nextBtn" onclick="navigateLesson(1)">下一節 →</button>
        </div>
      </div>
    </div>
  </main>

</div>

<script>
const data = [
  {
    chapter: "01　基礎框架",
    symbol: "✦",
    lessons: [
      { id: "1-1", title: "用太陽系視野讀懂天空地圖", url: "" },
      { id: "1-2", title: "迴歸黃道：為什麼星座只有十二個", url: "https://youtu.be/XS5j6aNjAS8" },
      { id: "1-3", title: "什麼是歲差現象？", url: "" },
      { id: "1-4", title: "四正星座（三模式）：你天生的能量底色", url: "" },
      { id: "1-5", title: "三方星座（四元素）：你天生的能量底色", url: "" },
    ]
  },
  {
    chapter: "02　Moon · 月亮",
    symbol: "☽",
    lessons: [
      { id: "2-1", title: "月亮盈缺：認識月相的運行節奏", url: "" },
      { id: "2-2", title: "月亮意識：安全感、依附與情緒的根", url: "" },
      { id: "2-3", title: "月亮在十二星座：你用什麼方式尋找安慰", url: "" },
    ]
  },
  {
    chapter: "03　Mars · 火星",
    symbol: "♂",
    lessons: [
      { id: "3-1", title: "火星意識：欲望、行動力與生存本能", url: "" },
      { id: "3-2", title: "火星的驅力：什麼發動火星", url: "" },
      { id: "3-3", title: "火星在十二星座：你如何戰鬥、如何追求", url: "" },
      { id: "3-4", title: "火星逆行：當行動力往內轉", url: "" },
    ]
  },
  {
    chapter: "04　Mercury · 水星",
    symbol: "☿",
    lessons: [
      { id: "4-1", title: "水星意識：語言、邏輯與溝通本能", url: "" },
      { id: "4-2", title: "改變水星運算漏洞", url: "" },
      { id: "4-3", title: "水星在十二星座：你的大腦是什麼頻道？", url: "" },
      { id: "4-4", title: "水星逆行：溝通卡關背後的訊息", url: "" },
    ]
  },
  {
    chapter: "05　Venus · 金星",
    symbol: "♀",
    lessons: [
      { id: "5-1", title: "金星意識：你如何享受美？", url: "" },
      { id: "5-2", title: "金星意識再一層：共振、關係與愛", url: "" },
      { id: "5-3", title: "金星在十二星座：你的愛語與審美密碼", url: "" },
      { id: "5-4", title: "金星逆行：重新審視享樂的信念", url: "" },
    ]
  },
  {
    chapter: "06　Sun · 太陽",
    symbol: "☉",
    lessons: [
      { id: "6-1", title: "太陽意識：你來這裡是為了發光，不只生存", url: "" },
      { id: "6-2", title: "太陽的群體位置與傳承", url: "" },
      { id: "6-3", title: "太陽在十二星座：你的天命方向與榮耀姿態", url: "" },
      { id: "6-4", title: "太陽的成就：走出自己、走向自己", url: "" },
    ]
  },
  {
    chapter: "07　相位初探",
    symbol: "△",
    lessons: [
      { id: "7-1", title: "相位：行星對話（即將開放）", url: "", soon: true },
    ]
  },
  {
    chapter: "08　宮位初探",
    symbol: "⌂",
    lessons: [
      { id: "8-1", title: "宮位：生命舞台（即將開放）", url: "", soon: true },
    ]
  },
];

// Flatten all lessons for index-based navigation
const allLessons = [];
data.forEach((ch, ci) => {
  ch.lessons.forEach((l, li) => {
    allLessons.push({ ...l, chapterName: ch.chapter, chapterSymbol: ch.symbol, chIndex: ci, lIndex: li });
  });
});

let currentIndex = -1;

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  let flatIdx = 0;
  data.forEach((ch, ci) => {
    html += `<div class="chapter-group">`;
    html += `<div class="chapter-label"><span class="ch-symbol">${ch.symbol}</span><span class="ch-name">${ch.chapter}</span></div>`;
    ch.lessons.forEach((l) => {
      const idx = flatIdx;
      const soonTag = l.soon ? `<span class="coming-soon-tag">soon</span>` : '';
      html += `<div class="lesson-item" id="item-${idx}" onclick="selectLesson(${idx})">
        <span class="lesson-num">${l.id}</span>
        <span class="lesson-name">${l.title}${soonTag}</span>
      </div>`;
      flatIdx++;
    });
    if (ci < data.length - 1) html += `<div class="sidebar-divider"></div>`;
    html += `</div>`;
  });
  nav.innerHTML = html;
}

function selectLesson(idx) {
  if (currentIndex === idx) return;
  
  // Deactivate previous
  if (currentIndex >= 0) {
    const prev = document.getElementById('item-' + currentIndex);
    if (prev) prev.classList.remove('active');
  }
  
  currentIndex = idx;
  const lesson = allLessons[idx];
  
  // Activate sidebar item
  const item = document.getElementById('item-' + idx);
  if (item) {
    item.classList.add('active');
    item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Update header
  document.getElementById('breadcrumb').textContent = lesson.chapterName;
  document.getElementById('mainTitle').textContent = lesson.id + '　' + lesson.title;

  // Hide welcome, show video state
  document.getElementById('welcomeState').style.display = 'none';
  document.getElementById('videoState').style.display = 'block';

  // Update lesson info
  document.getElementById('lessonChapterTag').textContent = lesson.chapterName;
  document.getElementById('lessonFullTitle').textContent = lesson.title;

  // Handle video
  const frame = document.getElementById('videoFrame');
  const placeholder = document.getElementById('videoPlaceholder');

  if (lesson.url && lesson.url.trim() !== '') {
    let embedUrl = lesson.url;
    // Convert YouTube watch URLs to embed
    const ytMatch = lesson.url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?]+)/);
    if (ytMatch) embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1`;
    // Convert Vimeo
    const vimeoMatch = lesson.url.match(/vimeo\.com\/(\d+)/);
    if (vimeoMatch) embedUrl = `https://player.vimeo.com/video/${vimeoMatch[1]}?autoplay=1`;

    frame.src = embedUrl;
    frame.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    frame.src = '';
    frame.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.querySelector('p').textContent = lesson.id + ' 影片連結待填入';
  }

  // Update nav buttons
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === allLessons.length - 1;
}

function navigateLesson(dir) {
  const next = currentIndex + dir;
  if (next >= 0 && next < allLessons.length) {
    selectLesson(next);
  }
}

buildSidebar();
</script>
</body>
</html>
